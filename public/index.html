<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Restaurant Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f4f9; }
        h2 { text-align: center; color: #333; }
        #chat-window { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 15px; margin-bottom: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user-msg { color: #0056b3; margin-bottom: 8px; font-weight: bold; }
        .bot-msg { color: #28a745; margin-bottom: 8px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        button { padding: 12px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <h2>🍽️ Restaurant AI Assistant</h2>
    <div id="chat-window"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Ask: What's in lunch?" />
        <button onclick="sendMessage()" id="send-btn">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const userInput = inputField.value.trim();
            if (!userInput) return;

            // Display User Message
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML += `<div class="user-msg">You: ${userInput}</div>`;
            
            // Clear input and disable button
            inputField.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "Thinking...";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: userInput })
                });
                
                const data = await response.json();
                
                // Display Bot Response
                chatWindow.innerHTML += `<div class="bot-msg">Bot: ${data.output}</div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
                
            } catch (error) {
                chatWindow.innerHTML += `<div class="bot-msg">Bot: Error connecting to server.</div>`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Send";
            }
        }

        // Allow 'Enter' key to send
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
